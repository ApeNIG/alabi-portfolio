<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Price grid -->
  <g opacity="0.04">
    <line x1="80" y1="60" x2="80" y2="420" stroke="white" stroke-width="0.5"/>
    <line x1="80" y1="420" x2="740" y2="420" stroke="white" stroke-width="0.5"/>
    <!-- Horizontal price levels -->
    <line x1="80" y1="100" x2="740" y2="100" stroke="white" stroke-width="0.5" stroke-dasharray="2 6"/>
    <line x1="80" y1="160" x2="740" y2="160" stroke="white" stroke-width="0.5" stroke-dasharray="2 6"/>
    <line x1="80" y1="220" x2="740" y2="220" stroke="white" stroke-width="0.5" stroke-dasharray="2 6"/>
    <line x1="80" y1="280" x2="740" y2="280" stroke="white" stroke-width="0.5" stroke-dasharray="2 6"/>
    <line x1="80" y1="340" x2="740" y2="340" stroke="white" stroke-width="0.5" stroke-dasharray="2 6"/>
  </g>

  <!-- Mean reversion band -->
  <path d="M100 240 Q200 220 300 250 Q400 280 500 230 Q600 180 700 220" stroke="#EA580C" stroke-width="1" opacity="0.15" fill="none"/>
  <path d="M100 200 Q200 180 300 210 Q400 240 500 190 Q600 140 700 180" stroke="#EA580C" stroke-width="0.5" opacity="0.08" fill="none" stroke-dasharray="3 3"/>
  <path d="M100 280 Q200 260 300 290 Q400 320 500 270 Q600 220 700 260" stroke="#EA580C" stroke-width="0.5" opacity="0.08" fill="none" stroke-dasharray="3 3"/>

  <!-- Candlesticks -->
  <!-- Candle 1 - green -->
  <line x1="130" y1="180" x2="130" y2="310" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="124" y="220" width="12" height="50" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 2 - red -->
  <line x1="170" y1="200" x2="170" y2="320" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="164" y="210" width="12" height="60" fill="#EA580C" opacity="0.4"/>
  <!-- Candle 3 - green -->
  <line x1="210" y1="240" x2="210" y2="350" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="204" y="280" width="12" height="40" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 4 - red -->
  <line x1="250" y1="220" x2="250" y2="340" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="244" y="230" width="12" height="70" fill="#EA580C" opacity="0.4"/>
  <!-- Candle 5 - green (IBS signal) -->
  <line x1="290" y1="260" x2="290" y2="380" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="284" y="310" width="12" height="40" fill="#22c55e" opacity="0.7"/>
  <!-- Signal arrow -->
  <polygon points="290,260 285,248 295,248" fill="#22c55e" opacity="0.8"/>
  <!-- Candle 6 -->
  <line x1="330" y1="240" x2="330" y2="350" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="324" y="270" width="12" height="50" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 7 -->
  <line x1="370" y1="200" x2="370" y2="310" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="364" y="220" width="12" height="60" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 8 - red -->
  <line x1="410" y1="180" x2="410" y2="280" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="404" y="190" width="12" height="50" fill="#EA580C" opacity="0.4"/>
  <!-- Candle 9 -->
  <line x1="450" y1="160" x2="450" y2="260" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="444" y="180" width="12" height="50" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 10 - red -->
  <line x1="490" y1="150" x2="490" y2="240" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="484" y="160" width="12" height="40" fill="#EA580C" opacity="0.4"/>
  <!-- Signal arrow down -->
  <polygon points="490,240 485,252 495,252" fill="#EA580C" opacity="0.8"/>
  <!-- Candle 11 -->
  <line x1="530" y1="170" x2="530" y2="280" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="524" y="200" width="12" height="50" fill="#EA580C" opacity="0.4"/>
  <!-- Candle 12 -->
  <line x1="570" y1="190" x2="570" y2="300" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="564" y="230" width="12" height="40" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 13 - green -->
  <line x1="610" y1="200" x2="610" y2="310" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="604" y="240" width="12" height="40" fill="#22c55e" opacity="0.7"/>
  <polygon points="610,200 605,188 615,188" fill="#22c55e" opacity="0.8"/>
  <!-- Candle 14 -->
  <line x1="650" y1="180" x2="650" y2="270" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="644" y="200" width="12" height="40" fill="#22c55e" opacity="0.5"/>
  <!-- Candle 15 -->
  <line x1="690" y1="170" x2="690" y2="250" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <rect x="684" y="190" width="12" height="30" fill="#22c55e" opacity="0.5"/>

  <!-- RSI indicator area -->
  <line x1="80" y1="380" x2="740" y2="380" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <!-- RSI oversold line -->
  <line x1="80" y1="410" x2="740" y2="410" stroke="#EA580C" stroke-width="0.5" opacity="0.1" stroke-dasharray="2 4"/>
  <!-- RSI line -->
  <path d="M100 400 L170 405 L250 412 L290 415 L330 408 L370 395 L410 390 L450 385 L490 382 L530 395 L570 405 L610 412 L650 400 L690 392" stroke="#EA580C" stroke-width="1.5" opacity="0.4" fill="none"/>

  <!-- Price labels -->
  <text x="50" y="105" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="end">220</text>
  <text x="50" y="165" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="end">200</text>
  <text x="50" y="225" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="end">180</text>
  <text x="50" y="285" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="end">160</text>
  <text x="50" y="345" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="end">140</text>

  <!-- Bottom label bar -->
  <line x1="60" y1="440" x2="740" y2="440" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <text x="80" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">IBS MEAN REVERSION</text>
  <text x="380" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">20 TIMERS</text>
  <text x="560" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">REAL CAPITAL</text>
  <text x="720" y="470" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.5" letter-spacing="2">24/7</text>
</svg>