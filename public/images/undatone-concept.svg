<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Editorial grid structure -->
  <g opacity="0.04">
    <line x1="60" y1="0" x2="60" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="260" y1="0" x2="260" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="740" y1="0" x2="740" y2="500" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Ankara pattern block - top left -->
  <g transform="translate(80, 60)">
    <!-- Ankara diamond pattern -->
    <g opacity="0.35">
      <path d="M0 60 L30 0 L60 60 L30 120 Z" fill="none" stroke="#EA580C" stroke-width="1.2"/>
      <path d="M60 60 L90 0 L120 60 L90 120 Z" fill="none" stroke="#EA580C" stroke-width="1.2"/>
      <path d="M30 0 L60 -40 L90 0" fill="none" stroke="#EA580C" stroke-width="0.8" opacity="0.5"/>
      <circle cx="30" cy="60" r="8" fill="none" stroke="#EA580C" stroke-width="0.8" opacity="0.6"/>
      <circle cx="90" cy="60" r="8" fill="none" stroke="#EA580C" stroke-width="0.8" opacity="0.6"/>
      <circle cx="60" cy="30" r="4" fill="#EA580C" opacity="0.4"/>
      <circle cx="60" cy="90" r="4" fill="#EA580C" opacity="0.4"/>
      <!-- Inner details -->
      <path d="M20 60 L30 40 L40 60 L30 80 Z" fill="#EA580C" opacity="0.15"/>
      <path d="M80 60 L90 40 L100 60 L90 80 Z" fill="#EA580C" opacity="0.15"/>
    </g>
  </g>

  <!-- Magazine layout blocks -->
  <!-- Headline block -->
  <rect x="280" y="60" width="440" height="8" rx="1" fill="white" opacity="0.6"/>
  <rect x="280" y="78" width="320" height="8" rx="1" fill="white" opacity="0.35"/>

  <!-- Subhead -->
  <rect x="280" y="110" width="200" height="4" rx="1" fill="#EA580C" opacity="0.3"/>

  <!-- Body text blocks -->
  <g opacity="0.12">
    <rect x="280" y="140" width="440" height="3" rx="1" fill="white"/>
    <rect x="280" y="150" width="440" height="3" rx="1" fill="white"/>
    <rect x="280" y="160" width="440" height="3" rx="1" fill="white"/>
    <rect x="280" y="170" width="380" height="3" rx="1" fill="white"/>
    <rect x="280" y="186" width="440" height="3" rx="1" fill="white"/>
    <rect x="280" y="196" width="440" height="3" rx="1" fill="white"/>
    <rect x="280" y="206" width="300" height="3" rx="1" fill="white"/>
  </g>

  <!-- Divider line -->
  <line x1="80" y1="240" x2="720" y2="240" stroke="#EA580C" stroke-width="0.8" opacity="0.15"/>

  <!-- Second row - data visualization area -->
  <!-- Artist stat columns -->
  <g transform="translate(80, 270)">
    <!-- Bar chart -->
    <rect x="0" y="80" width="24" height="60" fill="#EA580C" opacity="0.25"/>
    <rect x="36" y="50" width="24" height="90" fill="#EA580C" opacity="0.35"/>
    <rect x="72" y="30" width="24" height="110" fill="#EA580C" opacity="0.5"/>
    <rect x="108" y="60" width="24" height="80" fill="#EA580C" opacity="0.3"/>
    <rect x="144" y="20" width="24" height="120" fill="#EA580C" opacity="0.6"/>
    <!-- Axis -->
    <line x1="0" y1="140" x2="168" y2="140" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- Signal trace visualization -->
  <g transform="translate(340, 270)">
    <!-- Waveform -->
    <path d="M0 70 Q20 30 40 70 Q60 110 80 70 Q100 30 120 70 Q140 110 160 70 Q180 30 200 70 Q220 110 240 70 Q260 30 280 70 Q300 110 320 70 Q340 30 360 70"
          stroke="#EA580C" stroke-width="1.5" opacity="0.3" fill="none"/>
    <!-- Signal dots -->
    <circle cx="40" cy="70" r="3" fill="#EA580C" opacity="0.5"/>
    <circle cx="120" cy="70" r="3" fill="#EA580C" opacity="0.5"/>
    <circle cx="200" cy="70" r="3" fill="#EA580C" opacity="0.5"/>
    <circle cx="280" cy="70" r="3" fill="#EA580C" opacity="0.5"/>
    <circle cx="360" cy="70" r="3" fill="#EA580C" opacity="0.5"/>
  </g>

  <!-- Bottom label bar -->
  <line x1="60" y1="440" x2="740" y2="440" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <text x="80" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">EDITORIAL PLATFORM</text>
  <text x="360" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">8 DOSSIERS</text>
  <text x="540" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">ANKARA SVG</text>
  <text x="700" y="470" font-family="monospace" font-size="10" fill="#EA580C" opacity="0.4" letter-spacing="2">LIVE</text>
</svg>