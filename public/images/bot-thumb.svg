<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a0a"/>
  <!-- Chat bubbles -->
  <rect x="200" y="180" rx="12" ry="12" width="200" height="40" fill="white" opacity="0.06"/>
  <rect x="400" y="240" rx="12" ry="12" width="220" height="40" fill="#EA580C" opacity="0.1"/>
  <rect x="180" y="300" rx="12" ry="12" width="180" height="40" fill="white" opacity="0.04"/>
  <rect x="420" y="360" rx="12" ry="12" width="200" height="40" fill="#EA580C" opacity="0.08"/>
  <!-- Typing dots -->
  <circle cx="230" cy="430" r="4" fill="white" opacity="0.2"/>
  <circle cx="248" cy="430" r="4" fill="white" opacity="0.15"/>
  <circle cx="266" cy="430" r="4" fill="white" opacity="0.1"/>
  <!-- Voice waveform -->
  <g transform="translate(400, 500)" opacity="0.3">
    <rect x="-60" y="-8" width="3" height="16" fill="#EA580C" rx="1"/>
    <rect x="-50" y="-14" width="3" height="28" fill="#EA580C" rx="1"/>
    <rect x="-40" y="-6" width="3" height="12" fill="#EA580C" rx="1"/>
    <rect x="-30" y="-18" width="3" height="36" fill="#EA580C" rx="1"/>
    <rect x="-20" y="-10" width="3" height="20" fill="#EA580C" rx="1"/>
    <rect x="-10" y="-14" width="3" height="28" fill="#EA580C" rx="1"/>
    <rect x="0" y="-8" width="3" height="16" fill="#EA580C" rx="1"/>
    <rect x="10" y="-20" width="3" height="40" fill="#EA580C" rx="1"/>
    <rect x="20" y="-12" width="3" height="24" fill="#EA580C" rx="1"/>
    <rect x="30" y="-6" width="3" height="12" fill="#EA580C" rx="1"/>
    <rect x="40" y="-16" width="3" height="32" fill="#EA580C" rx="1"/>
    <rect x="50" y="-8" width="3" height="16" fill="#EA580C" rx="1"/>
  </g>
  <!-- Text -->
  <text x="400" y="560" font-family="monospace" font-size="11" fill="white" text-anchor="middle" opacity="0.3" letter-spacing="3">AI ASSISTANT</text>
</svg>