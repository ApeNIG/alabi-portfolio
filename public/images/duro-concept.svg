<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Fine grid -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="800" y2="50" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="500" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Epistemic layers - concentric zones -->
  <circle cx="400" cy="230" r="180" stroke="#EA580C" stroke-width="0.5" opacity="0.08" stroke-dasharray="4 4"/>
  <circle cx="400" cy="230" r="130" stroke="#EA580C" stroke-width="0.5" opacity="0.12" stroke-dasharray="4 4"/>
  <circle cx="400" cy="230" r="80" stroke="#EA580C" stroke-width="0.8" opacity="0.18"/>

  <!-- Connection lines - governance web -->
  <line x1="400" y1="230" x2="250" y2="140" stroke="#EA580C" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="230" x2="550" y2="140" stroke="#EA580C" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="230" x2="280" y2="330" stroke="#EA580C" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="230" x2="520" y2="330" stroke="#EA580C" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="230" x2="180" y2="240" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="230" x2="620" y2="220" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <line x1="400" y1="230" x2="340" y2="100" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="230" x2="460" y2="100" stroke="white" stroke-width="0.5" opacity="0.08"/>

  <!-- Cross connections -->
  <line x1="250" y1="140" x2="180" y2="240" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="550" y1="140" x2="620" y2="220" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="280" y1="330" x2="180" y2="240" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="520" y1="330" x2="620" y2="220" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="250" y1="140" x2="340" y2="100" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="550" y1="140" x2="460" y2="100" stroke="white" stroke-width="0.5" opacity="0.06"/>

  <!-- Central node - core -->
  <circle cx="400" cy="230" r="18" fill="#EA580C" opacity="0.2"/>
  <circle cx="400" cy="230" r="10" fill="#EA580C" opacity="0.4"/>
  <circle cx="400" cy="230" r="4" fill="#EA580C"/>

  <!-- Primary nodes -->
  <circle cx="250" cy="140" r="8" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.6"/>
  <circle cx="250" cy="140" r="3" fill="#EA580C" opacity="0.8"/>
  <circle cx="550" cy="140" r="8" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.6"/>
  <circle cx="550" cy="140" r="3" fill="#EA580C" opacity="0.8"/>
  <circle cx="280" cy="330" r="8" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.6"/>
  <circle cx="280" cy="330" r="3" fill="#EA580C" opacity="0.8"/>
  <circle cx="520" cy="330" r="8" fill="none" stroke="#EA580C" stroke-width="1.5" opacity="0.6"/>
  <circle cx="520" cy="330" r="3" fill="#EA580C" opacity="0.8"/>

  <!-- Secondary nodes -->
  <circle cx="180" cy="240" r="4" fill="white" opacity="0.2"/>
  <circle cx="620" cy="220" r="4" fill="white" opacity="0.2"/>
  <circle cx="340" cy="100" r="3" fill="white" opacity="0.15"/>
  <circle cx="460" cy="100" r="3" fill="white" opacity="0.15"/>

  <!-- Tertiary nodes - outer ring -->
  <circle cx="140" cy="160" r="2" fill="white" opacity="0.1"/>
  <circle cx="660" cy="160" r="2" fill="white" opacity="0.1"/>
  <circle cx="150" cy="350" r="2" fill="white" opacity="0.1"/>
  <circle cx="650" cy="350" r="2" fill="white" opacity="0.1"/>
  <circle cx="400" cy="60" r="2" fill="white" opacity="0.1"/>
  <circle cx="320" cy="400" r="2" fill="white" opacity="0.1"/>
  <circle cx="480" cy="400" r="2" fill="white" opacity="0.1"/>

  <!-- Gate indicators -->
  <rect x="218" y="178" width="64" height="18" rx="2" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.3"/>
  <text x="250" y="191" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle" opacity="0.5">VERIFIED</text>

  <rect x="518" y="178" width="64" height="18" rx="2" fill="none" stroke="#EA580C" stroke-width="0.8" opacity="0.3"/>
  <text x="550" y="191" font-family="monospace" font-size="8" fill="#EA580C" text-anchor="middle" opacity="0.5">GATED</text>

  <!-- Data flow pulses -->
  <circle cx="325" cy="185" r="2" fill="#EA580C" opacity="0.6"/>
  <circle cx="475" cy="185" r="2" fill="#EA580C" opacity="0.4"/>
  <circle cx="340" cy="280" r="2" fill="#EA580C" opacity="0.3"/>
  <circle cx="460" cy="280" r="2" fill="#EA580C" opacity="0.3"/>

  <!-- Bottom label bar -->
  <line x1="60" y1="440" x2="740" y2="440" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <text x="80" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">5,390 ARTIFACTS</text>
  <text x="300" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">84 RULES</text>
  <text x="480" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">61 SKILLS</text>
  <text x="660" y="470" font-family="monospace" font-size="10" fill="#EA580C" opacity="0.4" letter-spacing="2">LIVE</text>
</svg>