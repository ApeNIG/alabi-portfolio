<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0a0a0a"/>
  <!-- Price chart line -->
  <polyline points="80,400 140,380 200,350 260,370 320,320 380,280 440,300 500,240 560,220 620,260 680,200 720,180" stroke="#EA580C" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Area fill -->
  <polygon points="80,400 140,380 200,350 260,370 320,320 380,280 440,300 500,240 560,220 620,260 680,200 720,180 720,500 80,500" fill="url(#chartGrad)" opacity="0.15"/>
  <defs>
    <linearGradient id="chartGrad" x1="400" y1="180" x2="400" y2="500">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <g opacity="0.05">
    <line x1="80" y1="200" x2="720" y2="200" stroke="white"/>
    <line x1="80" y1="300" x2="720" y2="300" stroke="white"/>
    <line x1="80" y1="400" x2="720" y2="400" stroke="white"/>
  </g>
  <!-- Entry/exit markers -->
  <circle cx="320" cy="320" r="5" fill="#22c55e" opacity="0.8"/>
  <circle cx="560" cy="220" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="680" cy="200" r="5" fill="#22c55e" opacity="0.8"/>
  <!-- Text -->
  <text x="400" y="530" font-family="monospace" font-size="11" fill="white" text-anchor="middle" opacity="0.3" letter-spacing="3">ALGORITHMIC TRADING</text>
</svg>