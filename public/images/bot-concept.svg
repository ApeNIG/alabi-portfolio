<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Fine grid -->
  <g opacity="0.03">
    <line x1="80" y1="0" x2="80" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="500" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Chat interface frame -->
  <rect x="200" y="40" width="400" height="360" rx="4" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>

  <!-- Chat header -->
  <line x1="200" y1="72" x2="600" y2="72" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <circle cx="228" cy="56" r="4" fill="#22c55e" opacity="0.5"/>
  <rect x="242" y="52" width="60" height="4" rx="1" fill="white" opacity="0.3"/>
  <text x="242" y="66" font-family="monospace" font-size="7" fill="white" opacity="0.15">ONLINE</text>

  <!-- User message -->
  <g transform="translate(360, 92)">
    <rect x="0" y="0" width="220" height="36" rx="12" fill="white" opacity="0.06"/>
    <rect x="16" y="12" width="140" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="16" y="20" width="80" height="3" rx="1" fill="white" opacity="0.15"/>
  </g>

  <!-- Bot response with memory context -->
  <g transform="translate(220, 145)">
    <rect x="0" y="0" width="280" height="70" rx="12" fill="#EA580C" opacity="0.06"/>
    <rect x="0" y="0" width="3" height="70" rx="1" fill="#EA580C" opacity="0.3"/>
    <rect x="16" y="12" width="200" height="3" rx="1" fill="white" opacity="0.25"/>
    <rect x="16" y="20" width="240" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="16" y="28" width="180" height="3" rx="1" fill="white" opacity="0.2"/>
    <!-- Memory tag -->
    <rect x="16" y="44" width="50" height="14" rx="3" fill="none" stroke="#EA580C" stroke-width="0.8" opacity="0.3"/>
    <text x="41" y="54" font-family="monospace" font-size="7" fill="#EA580C" text-anchor="middle" opacity="0.5">MEMORY</text>
    <rect x="72" y="44" width="44" height="14" rx="3" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <text x="94" y="54" font-family="monospace" font-size="7" fill="white" text-anchor="middle" opacity="0.25">SEARCH</text>
  </g>

  <!-- Voice waveform message -->
  <g transform="translate(340, 235)">
    <rect x="0" y="0" width="240" height="36" rx="12" fill="white" opacity="0.06"/>
    <!-- Waveform bars -->
    <g transform="translate(16, 8)">
      <rect x="0" y="6" width="3" height="8" rx="1" fill="white" opacity="0.3"/>
      <rect x="6" y="3" width="3" height="14" rx="1" fill="white" opacity="0.3"/>
      <rect x="12" y="0" width="3" height="20" rx="1" fill="white" opacity="0.4"/>
      <rect x="18" y="4" width="3" height="12" rx="1" fill="white" opacity="0.3"/>
      <rect x="24" y="2" width="3" height="16" rx="1" fill="white" opacity="0.35"/>
      <rect x="30" y="6" width="3" height="8" rx="1" fill="white" opacity="0.3"/>
      <rect x="36" y="1" width="3" height="18" rx="1" fill="white" opacity="0.4"/>
      <rect x="42" y="5" width="3" height="10" rx="1" fill="white" opacity="0.3"/>
      <rect x="48" y="3" width="3" height="14" rx="1" fill="white" opacity="0.35"/>
      <rect x="54" y="7" width="3" height="6" rx="1" fill="white" opacity="0.25"/>
      <rect x="60" y="4" width="3" height="12" rx="1" fill="white" opacity="0.3"/>
      <rect x="66" y="2" width="3" height="16" rx="1" fill="white" opacity="0.35"/>
      <rect x="72" y="6" width="3" height="8" rx="1" fill="white" opacity="0.3"/>
      <rect x="78" y="0" width="3" height="20" rx="1" fill="white" opacity="0.4"/>
      <rect x="84" y="5" width="3" height="10" rx="1" fill="white" opacity="0.3"/>
    </g>
    <!-- Duration -->
    <text x="210" y="22" font-family="monospace" font-size="8" fill="white" opacity="0.2">0:04</text>
  </g>

  <!-- Bot response 2 -->
  <g transform="translate(220, 290)">
    <rect x="0" y="0" width="240" height="50" rx="12" fill="#EA580C" opacity="0.06"/>
    <rect x="0" y="0" width="3" height="50" rx="1" fill="#EA580C" opacity="0.3"/>
    <rect x="16" y="12" width="180" height="3" rx="1" fill="white" opacity="0.25"/>
    <rect x="16" y="20" width="200" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="16" y="28" width="120" height="3" rx="1" fill="white" opacity="0.2"/>
  </g>

  <!-- Memory access visualization - left side -->
  <g transform="translate(40, 80)">
    <!-- Memory nodes -->
    <circle cx="60" cy="40" r="20" stroke="#EA580C" stroke-width="0.8" opacity="0.15" fill="none"/>
    <circle cx="60" cy="40" r="3" fill="#EA580C" opacity="0.3"/>
    <circle cx="30" cy="100" r="14" stroke="white" stroke-width="0.5" opacity="0.08" fill="none"/>
    <circle cx="30" cy="100" r="2" fill="white" opacity="0.15"/>
    <circle cx="90" cy="110" r="14" stroke="white" stroke-width="0.5" opacity="0.08" fill="none"/>
    <circle cx="90" cy="110" r="2" fill="white" opacity="0.15"/>
    <circle cx="50" cy="170" r="10" stroke="white" stroke-width="0.5" opacity="0.06" fill="none"/>
    <circle cx="50" cy="170" r="2" fill="white" opacity="0.1"/>
    <circle cx="100" cy="180" r="10" stroke="white" stroke-width="0.5" opacity="0.06" fill="none"/>
    <!-- Connections -->
    <line x1="60" y1="60" x2="30" y2="86" stroke="#EA580C" stroke-width="0.5" opacity="0.15"/>
    <line x1="60" y1="60" x2="90" y2="96" stroke="#EA580C" stroke-width="0.5" opacity="0.15"/>
    <line x1="30" y1="114" x2="50" y2="160" stroke="white" stroke-width="0.5" opacity="0.06"/>
    <line x1="90" y1="124" x2="100" y2="170" stroke="white" stroke-width="0.5" opacity="0.06"/>

    <text x="60" y="230" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="middle">5,000+</text>
    <text x="60" y="242" font-family="monospace" font-size="7" fill="white" opacity="0.1" text-anchor="middle">ARTIFACTS</text>
  </g>

  <!-- Search visualization - right side -->
  <g transform="translate(640, 100)">
    <!-- Search icon -->
    <circle cx="50" cy="40" r="16" stroke="white" stroke-width="1" opacity="0.1" fill="none"/>
    <line x1="62" y1="52" x2="72" y2="62" stroke="white" stroke-width="1" opacity="0.1"/>
    <!-- Result lines -->
    <rect x="20" y="80" width="80" height="3" rx="1" fill="white" opacity="0.08"/>
    <rect x="20" y="92" width="60" height="3" rx="1" fill="white" opacity="0.06"/>
    <rect x="20" y="110" width="80" height="3" rx="1" fill="white" opacity="0.08"/>
    <rect x="20" y="122" width="50" height="3" rx="1" fill="white" opacity="0.06"/>
    <rect x="20" y="140" width="80" height="3" rx="1" fill="white" opacity="0.08"/>

    <text x="60" y="200" font-family="monospace" font-size="8" fill="white" opacity="0.15" text-anchor="middle">WEB</text>
    <text x="60" y="212" font-family="monospace" font-size="7" fill="white" opacity="0.1" text-anchor="middle">SEARCH</text>
  </g>

  <!-- Bottom label bar -->
  <line x1="60" y1="440" x2="740" y2="440" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <text x="80" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">VOICE + MEMORY + SEARCH</text>
  <text x="420" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">WHISPER STT</text>
  <text x="620" y="470" font-family="monospace" font-size="10" fill="white" opacity="0.2" letter-spacing="2">SYSTEMD</text>
  <text x="720" y="470" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.5" letter-spacing="2">LIVE</text>
</svg>